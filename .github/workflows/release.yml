name: Release

# Changesets-driven publish. Disabled until v0.2 (the first public release).
#
# v0.1 is an internal hand-test candidate — no npm publish, no public tag.
# Jeremy hand-tests every package locally; v0.2 is the first public release.
# When v0.2 is ready: switch this trigger back to `push: branches: [master]`,
# author a v0.2 changeset under `.changeset/`, set the NPM_TOKEN secret on
# the repo, and let the changesets-action open the Release PR.
on:
  workflow_dispatch:
    # Manual-only for v0.1. Re-enable on-push trigger above for v0.2.

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate @act-spec/core types from schemas/
        run: pnpm -F @act-spec/core codegen
      - name: Build
        run: pnpm -r --filter "./packages/*" run build
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
